<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="750" height="350" rx="15" fill="#0056b3"/>

    <text x="40" y="60" fill="white" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
        学院师资力量雄厚，拥有一支高水平、结构合理的师资队伍。
    </text>

    <g transform="translate(40, 110)">
        <text fill="white" font-family="Microsoft YaHei" font-size="20">现有教职工</text>
        <text x="110" y="5" fill="#ffb800" font-family="Arial" font-size="36" font-weight="bold">133</text>
        <text x="180" y="0" fill="white" font-family="Microsoft YaHei" font-size="20">人，其中专任教师</text>
        <text x="350" y="5" fill="#ffb800" font-family="Arial" font-size="36" font-weight="bold">100</text>
        <text x="420" y="0" fill="white" font-family="Microsoft YaHei" font-size="20">人。</text>
    </g>

    <g transform="translate(40, 160)">
        <text fill="white" font-family="Microsoft YaHei" font-size="20">正高职称</text>
        <text x="90" y="5" fill="#ffb800" font-family="Arial" font-size="32" font-weight="bold">23</text>
        <text x="135" y="0" fill="white" font-family="Microsoft YaHei" font-size="20">人，副高</text>
        <text x="215" y="5" fill="#ffb800" font-family="Arial" font-size="32" font-weight="bold">39</text>
        <text x="260" y="0" fill="white" font-family="Microsoft YaHei" font-size="20">人；博士学位教师</text>
        <text x="440" y="5" fill="#ffb800" font-family="Arial" font-size="32" font-weight="bold">45</text>
        <text x="485" y="0" fill="white" font-family="Microsoft YaHei" font-size="20">人。</text>
    </g>

    <g transform="translate(40, 210)">
        <text fill="white" font-family="Microsoft YaHei" font-size="20">导师</text>
        <text x="60" y="5" fill="#ffb800" font-family="Arial" font-size="32" font-weight="bold">69</text>
        <text x="105" y="0" fill="white" font-family="Microsoft YaHei" font-size="20">人，省级领军及各类人才</text>
        <text x="340" y="5" fill="#ffb800" font-family="Arial" font-size="32" font-weight="bold">12</text>
        <text x="390" y="0" fill="white" font-family="Microsoft YaHei" font-size="20">人次。</text>
    </g>

    <g transform="translate(40, 260)">
        <text fill="white" font-family="Microsoft YaHei" font-size="20">博士化率</text>
        <text x="90" y="5" fill="#ffb800" font-family="Arial" font-size="36" font-weight="bold">60%</text>
    </g>
    <g transform="translate(40, 310)">
        <text fill="white" font-family="Microsoft YaHei" font-size="20" opacity="0.9">
            获省五一劳动奖章、教学名师、讲课竞赛一等奖等省级以上荣誉 4 人次。
        </text>
    </g>

</svg>