            <text x="200" y="265" text-anchor="start" dominant-baseline="central" font-family="Source Han Sans CN, Source Han Sans CN Bold" font-size="48" font-weight="700" fill="#FFB404">7740</text>
            <text x="320" y="265" text-anchor="start" dominant-baseline="central" font-family="Source Han Sans CN" font-size="28" font-weight="400" fill="white">万</text>
